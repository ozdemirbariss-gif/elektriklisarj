name: Daily Scrape

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FAIL_ON_SOURCE_ERROR: "0"
      MIN_SCRAPER_RECORD_COUNT: "1000"
      MIN_SCRAPER_SOURCE_COUNT: "1"

    steps:
      - name: Repo kodunu indir
        uses: actions/checkout@v6

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Repodaki dosyalari goster
        run: |
          pwd
          find . -maxdepth 3 -type f

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Scrape kodunu calistir
        run: python scraper.py

      - name: Degisiklik varsa commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add istasyonlar.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "Update scraped data"
            git push
          fi
